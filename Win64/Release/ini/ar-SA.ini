[EncodingDescriptions]
# وصف ترميزات يونيكود
UTF8=ترميز يونيكود بدون BOM، مناسب لصفحات الويب والنصوص متعددة المنصات
UTF8BOM=ترميز يونيكود مع BOM، أكثر توافقًا مع ويندوز
UTF16LE=ترميز يونيكود 16 بت، تنسيق ويندوز القياسي
UTF16BE=ترميز يونيكود 16 بت، تنسيق شائع في ماك/يونكس
UTF32LE=ترميز يونيكود 32 بت، يدعم جميع أحرف يونيكود
UTF32BE=ترميز يونيكود 32 بت، إصدار بيج إنديان
UTF7=ترميز يونيكود متوافق مع ASCII 7 بت، يستخدم في أنظمة البريد

# وصف الترميزات الأساسية
ASCII=مجموعة أحرف إنجليزية أساسية، تدعم فقط الأحرف الإنجليزية والأرقام
ANSI=ترميز النظام الافتراضي الحالي، عادة CP1252 في ويندوز

# وصف الترميزات الصينية
GBK=معيار وطني صيني، يدعم الأحرف المبسطة وبعض الأحرف التقليدية
GB18030=معيار صيني إلزامي، يدعم جميع الأحرف الصينية
GB2312=ترميز صيني مبسط أساسي، يدعم فقط الأحرف الشائعة
BIG5=ترميز صيني تقليدي يستخدم في تايوان وهونغ كونغ
BIG5_HKSCS=مجموعة أحرف هونغ كونغ التكميلية، تدعم أحرف هونغ كونغ الخاصة
CP936=ترميز ويندوز الصيني المبسط، مطابق أساسًا لـ GBK
CP950=ترميز ويندوز الصيني التقليدي، مطابق أساسًا لـ Big5
EUC_TW=ترميز يونكس الموسع المستخدم في تايوان

# وصف الترميزات اليابانية
SHIFT_JIS=ترميز ياباني شائع، ترميز ويندوز الياباني الافتراضي
EUC_JP=ترميز ياباني شائع الاستخدام في أنظمة يونكس
CP932=ترميز ويندوز الياباني، نسخة موسعة من Shift-JIS
