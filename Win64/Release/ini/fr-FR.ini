[EncodingDescriptions]
# Descriptions des encodages Unicode
UTF8=Encodage Unicode sans BOM, adapté aux pages web et au texte multiplateforme
UTF8BOM=Encodage Unicode avec BOM, plus compatible sous Windows
UTF16LE=Encodage Unicode 16 bits, format standard de Windows
UTF16BE=Encodage Unicode 16 bits, format courant sur Mac/Unix
UTF32LE=Encodage Unicode 32 bits, prend en charge tous les caractères Unicode
UTF32BE=Encodage Unicode 32 bits, version big-endian
UTF7=Encodage Unicode compatible ASCII 7 bits, utilisé dans les systèmes de messagerie

# Descriptions des encodages de base
ASCII=Jeu de caractères anglais de base, ne prend en charge que l'anglais et les chiffres
ANSI=Encodage par défaut du système actuel, généralement CP1252 sous Windows

# Descriptions des encodages chinois
GBK=Norme nationale chinoise, prend en charge les caractères simplifiés et certains traditionnels
GB18030=Norme chinoise obligatoire, prend en charge tous les caractères chinois
GB2312=Encodage chinois simplifié de base, ne prend en charge que les caractères courants
BIG5=Encodage chinois traditionnel utilisé à Taïwan et Hong Kong
BIG5_HKSCS=Jeu de caractères supplémentaires de Hong Kong, prend en charge les caractères spéciaux de Hong Kong
CP936=Encodage chinois simplifié Windows, essentiellement identique à GBK
CP950=Encodage chinois traditionnel Windows, essentiellement identique à Big5
EUC_TW=Encodage Unix étendu utilisé à Taïwan

# Descriptions des encodages japonais
SHIFT_JIS=Encodage japonais le plus courant, encodage japonais par défaut de Windows
EUC_JP=Encodage japonais couramment utilisé dans les systèmes Unix
CP932=Encodage japonais Windows, version étendue de Shift-JIS
ISO_2022_JP=Encodage japonais utilisé dans les e-mails et les pages web

# Descriptions des encodages coréens
EUC_KR=Encodage coréen couramment utilisé dans les systèmes Unix
CP949=Encodage coréen Windows, version étendue de EUC-KR
ISO_2022_KR=Encodage coréen utilisé dans les systèmes de messagerie

# Descriptions des encodages Windows
WINDOWS1250=Encodage Europe centrale Windows, prend en charge le polonais, le tchèque, etc.
WINDOWS1251=Encodage cyrillique Windows, prend en charge le russe, etc.
WINDOWS1252=Encodage Europe occidentale Windows, prend en charge l'anglais, le français, l'allemand, etc.
WINDOWS1253=Encodage grec Windows
WINDOWS1254=Encodage turc Windows
WINDOWS1255=Encodage hébreu Windows, affichage de droite à gauche
WINDOWS1256=Encodage arabe Windows, affichage de droite à gauche
WINDOWS1257=Encodage baltique Windows
WINDOWS1258=Encodage vietnamien Windows

# Descriptions des encodages ISO
ISO8859_1=Alphabet latin 1 standard international, langues d'Europe occidentale
ISO8859_2=Alphabet latin 2 standard international, langues d'Europe centrale
