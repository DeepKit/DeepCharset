[EncodingDescriptions]
# Unicode-Kodierungsbeschreibungen
UTF8=Unicode-Kodierung ohne BOM, geeignet für Webseiten und plattformübergreifenden Text
UTF8BOM=Unicode-Kodierung mit BOM, besser kompatibel unter Windows
UTF16LE=16-Bit-Unicode-Kodierung, Windows-Standardformat
UTF16BE=16-Bit-Unicode-Kodierung, Mac/Unix-übliches Format
UTF32LE=32-Bit-Unicode-Kodierung, unterstützt alle Unicode-Zeichen
UTF32BE=32-Bit-Unicode-Kodierung, Big-Endian-Bytereihenfolge
UTF7=7-Bit-ASCII-kompatible Unicode-Kodierung für Mailsysteme

# Grundlegende Kodierungsbeschreibungen
ASCII=Grundlegendes englisches Zeichenset, unterstützt nur englische Zeichen und Zahlen
ANSI=Aktuelle Systemstandardkodierung, unter Windows meist CP1252

# Chinesische Kodierungsbeschreibungen
GBK=Chinesischer Nationalstandard, unterstützt vereinfachte und einige traditionelle Zeichen
GB18030=Chinesischer Pflichtstandard, unterstützt alle chinesischen Zeichen
GB2312=Grundlegende vereinfachte chinesische Kodierung, unterstützt nur gebräuchliche Zeichen
BIG5=Traditionelle chinesische Kodierung für Taiwan und Hongkong
BIG5_HKSCS=Hongkong-Ergänzungszeichensatz, unterstützt spezielle Hongkong-Zeichen
CP936=Windows vereinfachte chinesische Kodierung, im Wesentlichen identisch mit GBK
CP950=Windows traditionelle chinesische Kodierung, im Wesentlichen identisch mit Big5
EUC_TW=Erweiterte Unix-Kodierung für Taiwan

# Japanische Kodierungsbeschreibungen
SHIFT_JIS=Gebräuchlichste japanische Kodierung, Windows-Standard für Japanisch
EUC_JP=Japanische Kodierung, häufig in Unix-Systemen verwendet
