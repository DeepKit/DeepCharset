[EncodingDescriptions]
# Descrizioni delle codifiche Unicode
UTF8=Codifica Unicode senza BOM, adatta per pagine web e testo multipiattaforma
UTF8BOM=Codifica Unicode con BOM, più compatibile in Windows
UTF16LE=Codifica Unicode a 16 bit, formato standard di Windows
UTF16BE=Codifica Unicode a 16 bit, formato comune su Mac/Unix
UTF32LE=Codifica Unicode a 32 bit, supporta tutti i caratteri Unicode
UTF32BE=Codifica Unicode a 32 bit, versione big-endian
UTF7=Codifica Unicode compatibile con ASCII a 7 bit, usata nei sistemi di posta

# Descrizioni delle codifiche di base
ASCII=Set di caratteri inglese di base, supporta solo inglese e numeri
ANSI=Codifica predefinita del sistema attuale, generalmente CP1252 in Windows

# Descrizioni delle codifiche cinesi
GBK=Standard nazionale cinese, supporta caratteri semplificati e alcuni tradizionali
GB18030=Standard cinese obbligatorio, supporta tutti i caratteri cinesi
GB2312=Codifica cinese semplificata di base, supporta solo caratteri comuni
BIG5=Codifica cinese tradizionale usata a Taiwan e Hong Kong
BIG5_HKSCS=Set di caratteri supplementari di Hong Kong, supporta caratteri speciali di Hong Kong
CP936=Codifica cinese semplificata Windows, essenzialmente identica a GBK
CP950=Codifica cinese tradizionale Windows, essenzialmente identica a Big5
EUC_TW=Codifica Unix estesa usata a Taiwan

# Descrizioni delle codifiche giapponesi
SHIFT_JIS=Codifica giapponese più comune, codifica giapponese predefinita di Windows
EUC_JP=Codifica giapponese comunemente usata nei sistemi Unix
CP932=Codifica giapponese Windows, versione estesa di Shift-JIS
ISO_2022_JP=Codifica giapponese usata nelle email e nelle pagine web

# Descrizioni delle codifiche coreane
EUC_KR=Codifica coreana comunemente usata nei sistemi Unix
CP949=Codifica coreana Windows, versione estesa di EUC-KR
ISO_2022_KR=Codifica coreana usata nei sistemi di posta

# Descrizioni delle codifiche Windows
WINDOWS1250=Codifica Europa centrale Windows, supporta polacco, ceco, ecc.
WINDOWS1251=Codifica cirillica Windows, supporta russo, ecc.
WINDOWS1252=Codifica Europa occidentale Windows, supporta inglese, francese, tedesco, ecc.
WINDOWS1253=Codifica greca Windows
WINDOWS1254=Codifica turca Windows
WINDOWS1255=Codifica ebraica Windows, visualizzazione da destra a sinistra
WINDOWS1256=Codifica araba Windows, visualizzazione da destra a sinistra
WINDOWS1257=Codifica baltica Windows
WINDOWS1258=Codifica vietnamita Windows

# Descrizioni delle codifiche ISO
ISO8859_1=Alfabeto latino 1 standard internazionale, lingue dell'Europa occidentale
ISO8859_2=Alfabeto latino 2 standard internazionale, lingue dell'Europa centrale
ISO8859_3=Alfabeto latino 3 standard internazionale, lingue dell'Europa meridionale
ISO8859_4=Alfabeto latino 4 standard internazionale, lingue dell'Europa settentrionale
ISO8859_5=Alfabeto cirillico standard internazionale, lingue slave
ISO8859_6=Alfabeto arabo standard internazionale
ISO8859_7=Alfabeto greco standard internazionale
ISO8859_8=Alfabeto ebraico standard internazionale
ISO8859_9=Alfabeto latino 5 standard internazionale, turco
ISO8859_10=Alfabeto latino 6 standard internazionale, lingue nordiche
ISO8859_11=Alfabeto tailandese standard internazionale
ISO8859_13=Alfabeto latino 7 standard internazionale, lingue baltiche
ISO8859_14=Alfabeto latino 8 standard internazionale, lingue celtiche
ISO8859_15=Alfabeto latino 9 standard internazionale, Europa occidentale aggiornata
ISO8859_16=Alfabeto latino 10 standard internazionale, lingue dell'Europa sud-orientale
ISO_8859_6_I=Alfabeto arabo standard internazionale, supporta visualizzazione da destra a sinistra

# Descrizioni delle codifiche DOS/OEM
IBM437=Codifica inglese americano DOS, include caratteri grafici di base
