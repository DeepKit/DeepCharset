[EncodingDescriptions]
# Descrições de codificação Unicode
UTF8=Codificação Unicode sem marca BOM, adequada para páginas web e texto multiplataforma
UTF8BOM=Codificação Unicode com marca BOM, mais compatível no Windows
UTF16LE=Codificação Unicode de 16 bits, formato padrão do Windows
UTF16BE=Codificação Unicode de 16 bits, formato comum em Mac/Unix
UTF32LE=Codificação Unicode de 32 bits, suporta todos os caracteres Unicode
UTF32BE=Codificação Unicode de 32 bits, versão big-endian
UTF7=Codificação Unicode compatível com ASCII de 7 bits usada em sistemas de e-mail

# Descrições de codificação básica
ASCII=Conjunto de caracteres básicos em inglês, suporta apenas inglês e números
ANSI=Codificação padrão do sistema atual, geralmente CP1252 no Windows

# Descrições de codificação chinesa
GBK=Codificação padrão nacional chinesa, suporta chinês simplificado e parte do tradicional
GB18030=Codificação padrão obrigatória chinesa, suporta todos os caracteres chineses
GB2312=Codificação básica do chinês simplificado, suporta apenas caracteres comuns
BIG5=Codificação do chinês tradicional usada em Taiwan e Hong Kong
BIG5_HKSCS=Conjunto de caracteres suplementares de Hong Kong, suporta caracteres especiais de Hong Kong
CP936=Codificação do chinês simplificado do Windows, basicamente igual ao GBK
CP950=Codificação do chinês tradicional do Windows, basicamente igual ao Big5
EUC_TW=Codificação Unix estendida usada em Taiwan

# Descrições de codificação japonesa
SHIFT_JIS=Codificação japonesa mais comum, codificação japonesa padrão do Windows
EUC_JP=Codificação japonesa comum em sistemas Unix
CP932=Codificação japonesa do Windows, versão estendida do Shift-JIS
ISO_2022_JP=Codificação usada em e-mails e páginas web japonesas

# Descrições de codificação coreana
EUC_KR=Codificação coreana comum em sistemas Unix
CP949=Codificação coreana do Windows, versão estendida do EUC-KR
ISO_2022_KR=Codificação usada em sistemas de e-mail coreanos

# Descrições de codificação do Windows
WINDOWS1250=Codificação de línguas da Europa Central do Windows, suporta polonês, tcheco, etc.
WINDOWS1251=Codificação cirílica do Windows, suporta russo, etc.
WINDOWS1252=Codificação de línguas da Europa Ocidental do Windows, suporta inglês, francês, alemão, etc.
WINDOWS1253=Codificação grega do Windows
WINDOWS1254=Codificação turca do Windows
WINDOWS1255=Codificação hebraica do Windows, exibição da direita para a esquerda
WINDOWS1256=Codificação árabe do Windows, exibição da direita para a esquerda
WINDOWS1257=Codificação de línguas bálticas do Windows
WINDOWS1258=Codificação vietnamita do Windows

# Descrições de codificação ISO
ISO8859_1=Alfabeto latino 1 padrão internacional, línguas da Europa Ocidental
ISO8859_2=Alfabeto latino 2 padrão internacional, línguas da Europa Central
ISO8859_3=Alfabeto latino 3 padrão internacional, línguas da Europa Meridional
ISO8859_4=Alfabeto latino 4 padrão internacional, línguas nórdicas
ISO8859_5=Alfabeto cirílico padrão internacional, línguas eslavas
ISO8859_6=Alfabeto árabe padrão internacional
ISO8859_7=Alfabeto grego padrão internacional
ISO8859_8=Alfabeto hebraico padrão internacional
ISO8859_9=Alfabeto latino 5 padrão internacional, turco
ISO8859_10=Alfabeto latino 6 padrão internacional, línguas nórdicas
ISO8859_11=Alfabeto tailandês padrão internacional
ISO8859_13=Alfabeto latino 7 padrão internacional, línguas bálticas
ISO8859_14=Alfabeto latino 8 padrão internacional, línguas celtas
ISO8859_15=Alfabeto latino 9 padrão internacional, versão atualizada das línguas da Europa Ocidental
ISO8859_16=Alfabeto latino 10 padrão internacional, línguas do sudeste europeu
ISO_8859_6_I=Alfabeto árabe padrão internacional, suporta exibição da direita para a esquerda

# Descrições de codificação DOS/OEM
IBM437=Codificação inglesa americana DOS, inclui caracteres gráficos básicos
IBM850=Codificação de línguas da Europa Ocidental DOS
IBM860=Codificação portuguesa DOS
IBM865=Codificação de línguas nórdicas DOS
CP862=Codificação hebraica DOS
