[EncodingDescriptions]
# Descripciones de Codificaciones Unicode
UTF8=Codificación Unicode sin BOM, adecuada para páginas web y texto multiplataforma
UTF8BOM=Codificación Unicode con BOM, más compatible en Windows
UTF16LE=Codificación Unicode de 16 bits, formato estándar de Windows
UTF16BE=Codificación Unicode de 16 bits, formato común en Mac/Unix
UTF32LE=Codificación Unicode de 32 bits, soporta todos los caracteres Unicode
UTF32BE=Codificación Unicode de 32 bits, versión big-endian
UTF7=Codificación Unicode compatible con ASCII de 7 bits, usada en sistemas de correo

# Descripciones de Codificaciones Básicas
ASCII=Conjunto de caracteres inglés básico, solo soporta inglés y números
ANSI=Codificación predeterminada del sistema actual, generalmente CP1252 en Windows

# Descripciones de Codificaciones Chinas
GBK=Estándar nacional chino, soporta caracteres simplificados y algunos tradicionales
GB18030=Estándar obligatorio chino, soporta todos los caracteres chinos
GB2312=Codificación básica china simplificada, solo soporta caracteres comunes
BIG5=Codificación china tradicional usada en Taiwán y Hong Kong
BIG5_HKSCS=Conjunto de caracteres suplementarios de Hong Kong, soporta caracteres especiales de Hong Kong
CP936=Codificación china simplificada de Windows, básicamente igual que GBK
CP950=Codificación china tradicional de Windows, básicamente igual que Big5
EUC_TW=Codificación Unix extendida usada en Taiwán

# Descripciones de Codificaciones Japonesas
SHIFT_JIS=Codificación japonesa más común, codificación japonesa predeterminada de Windows
EUC_JP=Codificación japonesa comúnmente usada en sistemas Unix
CP932=Codificación japonesa de Windows, versión extendida de Shift-JIS
ISO_2022_JP=Codificación japonesa usada en correo electrónico y páginas web

# Descripciones de Codificaciones Coreanas
EUC_KR=Codificación coreana comúnmente usada en sistemas Unix
CP949=Codificación coreana de Windows, versión extendida de EUC-KR
ISO_2022_KR=Codificación coreana usada en sistemas de correo

# Descripciones de Codificaciones Windows
WINDOWS1250=Codificación de Europa central de Windows, soporta polaco, checo, etc.
WINDOWS1251=Codificación cirílica de Windows, soporta ruso, etc.
WINDOWS1252=Codificación de Europa occidental de Windows, soporta inglés, francés, alemán, etc.
WINDOWS1253=Codificación griega de Windows
WINDOWS1254=Codificación turca de Windows
WINDOWS1255=Codificación hebrea de Windows, visualización de derecha a izquierda
WINDOWS1256=Codificación árabe de Windows, visualización de derecha a izquierda
WINDOWS1257=Codificación báltica de Windows
WINDOWS1258=Codificación vietnamita de Windows

# Descripciones de Codificaciones ISO
ISO8859_1=Alfabeto latino 1 estándar internacional, lenguas de Europa occidental
ISO8859_2=Alfabeto latino 2 estándar internacional, lenguas de Europa central
ISO8859_3=Alfabeto latino 3 estándar internacional, lenguas de Europa meridional
ISO8859_4=Alfabeto latino 4 estándar internacional, lenguas de Europa septentrional
ISO8859_5=Alfabeto cirílico estándar internacional, lenguas eslavas
ISO8859_6=Alfabeto árabe estándar internacional
ISO8859_7=Alfabeto griego estándar internacional
ISO8859_8=Alfabeto hebreo estándar internacional
ISO8859_9=Alfabeto latino 5 estándar internacional, turco
ISO8859_10=Alfabeto latino 6 estándar internacional, lenguas nórdicas
ISO8859_11=Alfabeto tailandés estándar internacional
ISO8859_13=Alfabeto latino 7 estándar internacional, lenguas bálticas
ISO8859_14=Alfabeto latino 8 estándar internacional, lenguas celtas
ISO8859_15=Alfabeto latino 9 estándar internacional, Europa occidental actualizada
ISO8859_16=Alfabeto latino 10 estándar internacional, lenguas de Europa sudoriental
ISO_8859_6_I=Alfabeto árabe estándar internacional, soporta visualización de derecha a izquierda

# Descripciones de Codificaciones DOS/OEM
IBM437=Codificación inglés estadounidense DOS, incluye caracteres gráficos básicos
IBM850=Codificación Europa occidental DOS
IBM860=Codificación portuguesa DOS
IBM865=Codificación nórdica DOS
CP862=Codificación hebrea DOS
CP864=Codificación árabe DOS

# Descripciones de Codificaciones Regionales
