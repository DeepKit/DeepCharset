[EncodingDescriptions]
# Описания кодировок Unicode
UTF8=Кодировка Unicode без метки BOM, подходит для веб-страниц и кросс-платформенного текста
UTF8BOM=Кодировка Unicode с меткой BOM, более совместима в Windows
UTF16LE=16-битная кодировка Unicode, стандартный формат Windows
UTF16BE=16-битная кодировка Unicode, распространенный формат Mac/Unix
UTF32LE=32-битная кодировка Unicode, поддерживает все символы Unicode
UTF32BE=32-битная кодировка Unicode, версия с обратным порядком байтов
UTF7=7-битная ASCII-совместимая кодировка Unicode, используемая в почтовых системах

# Описания базовых кодировок
ASCII=Базовый набор английских символов, поддерживает только английский и цифры
ANSI=Кодировка по умолчанию текущей системы, обычно CP1252 в Windows

# Описания китайских кодировок
GBK=Китайский национальный стандарт кодирования, поддерживает упрощенный и частично традиционный китайский
GB18030=Обязательный китайский стандарт кодирования, поддерживает все китайские символы
GB2312=Базовая кодировка упрощенного китайского, поддерживает только общие символы
BIG5=Кодировка традиционного китайского, используемая на Тайване и в Гонконге
BIG5_HKSCS=Дополнительный набор символов Гонконга, поддерживает специальные символы Гонконга
CP936=Кодировка упрощенного китайского Windows, в основном идентична GBK
CP950=Кодировка традиционного китайского Windows, в основном идентична Big5
EUC_TW=Расширенная Unix-кодировка, используемая на Тайване

# Описания японских кодировок
SHIFT_JIS=Наиболее распространенная японская кодировка, стандартная японская кодировка Windows
EUC_JP=Распространенная японская кодировка в системах Unix
CP932=Японская кодировка Windows, расширенная версия Shift-JIS
ISO_2022_JP=Кодировка, используемая в японских электронных письмах и веб-страницах

# Описания корейских кодировок
EUC_KR=Распространенная корейская кодировка в системах Unix
CP949=Корейская кодировка Windows, расширенная версия EUC-KR
ISO_2022_KR=Кодировка, используемая в корейских почтовых системах

