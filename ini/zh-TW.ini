[EncodingDescriptions]
# Unicode編碼描述
UTF8=無BOM標記的Unicode編碼，適用於網頁和跨平台文本
UTF8BOM=帶BOM標記的Unicode編碼，Windows下更兼容
UTF16LE=16位Unicode編碼，Windows默認格式
UTF16BE=16位Unicode編碼，Mac/Unix常用格式
UTF32LE=32位Unicode編碼，支持所有Unicode字符
UTF32BE=32位Unicode編碼，大端字節序版本
UTF7=郵件系統使用的7位ASCII兼容Unicode編碼

# 基本編碼描述
ASCII=基本英文字符集，僅支持英文和數字
ANSI=當前系統默認編碼，Windows中通常是CP1252

# 中文編碼描述
GBK=中國國家標準編碼，支持簡體和部分繁體
GB18030=中國強制標準編碼，支持所有漢字
GB2312=簡體中文基本編碼，僅支持常用漢字
BIG5=台灣和香港地區使用的繁體中文編碼
BIG5_HKSCS=香港增補字符集，支持香港特殊用字
CP936=Windows簡體中文編碼，與GBK基本相同
CP950=Windows繁體中文編碼，與Big5基本相同
EUC_TW=台灣地區使用的擴展Unix編碼

# 日文編碼描述
SHIFT_JIS=日本最常用的編碼，Windows默認日文編碼
EUC_JP=Unix系統常用的日文編碼
CP932=Windows日文編碼，Shift-JIS的擴展版本
ISO_2022_JP=日本郵件和網頁使用的編碼

# 韓文編碼描述
EUC_KR=Unix系統常用的韓文編碼
CP949=Windows韓文編碼，EUC-KR的擴展版本
ISO_2022_KR=韓國郵件系統使用的編碼

# Windows編碼描述
WINDOWS1250=Windows中歐語言編碼，支持波蘭、捷克等
WINDOWS1251=Windows西里爾文編碼，支持俄語等
WINDOWS1252=Windows西歐語言編碼，支持英語、法語、德語等
WINDOWS1253=Windows希臘語編碼
WINDOWS1254=Windows土耳其語編碼
WINDOWS1255=Windows希伯來語編碼，從右到左顯示
WINDOWS1256=Windows阿拉伯語編碼，從右到左顯示
WINDOWS1257=Windows波羅的海語言編碼
WINDOWS1258=Windows越南語編碼

# ISO編碼描述
ISO8859_1=國際標準拉丁字母1，西歐語言
ISO8859_2=國際標準拉丁字母2，中歐語言
ISO8859_3=國際標準拉丁字母3，南歐語言
ISO8859_4=國際標準拉丁字母4，北歐語言
ISO8859_5=國際標準西里爾字母，斯拉夫語言
ISO8859_6=國際標準阿拉伯字母
ISO8859_7=國際標準希臘字母
ISO8859_8=國際標準希伯來字母
ISO8859_9=國際標準拉丁字母5，土耳其語
ISO8859_10=國際標準拉丁字母6，北歐語言
ISO8859_11=國際標準泰語字母
ISO8859_13=國際標準拉丁字母7，波羅的海語言
ISO8859_14=國際標準拉丁字母8，凱爾特語言
ISO8859_15=國際標準拉丁字母9，西歐語言更新版
ISO8859_16=國際標準拉丁字母10，東南歐語言
ISO_8859_6_I=國際標準阿拉伯字母，支持從右到左顯示

# DOS/OEM編碼描述
IBM437=DOS美國英語編碼，包含基本圖形字符
IBM850=DOS西歐語言編碼
IBM860=DOS葡萄牙語編碼
IBM865=DOS北歐語言編碼
CP862=DOS希伯來語編碼
CP864=DOS阿拉伯語編碼

# 其他區域編碼描述
KOI8R=俄語編碼，互聯網和Unix系統常用
KOI8U=烏克蘭語編碼，KOI8-R的擴展
MACROMAN=蘋果Mac系統西歐語言編碼
MACCYRILLIC=蘋果Mac系統西里爾文編碼
VISCII=越南語編碼，支持所有越南文字符
TIS_620=泰國標準編碼，支持泰文
TSCII=泰米爾語編碼，印度南部語言
ISCII=印度語言編碼，支持多種印度語言
ARMSCII_8=亞美尼亞語編碼
MONGOLIAN=蒙古語編碼，支持傳統蒙古文
TIBETAN=藏語編碼，支持藏文字符
LAO=寮國語編碼，支持寮國文字符
KHMER=柬埔寨高棉語編碼
MYANMAR=緬甸語編碼，支持緬甸文字符
INDONESIAN=印尼語編碼
MALAY=馬來語編碼
GEEZ=埃塞俄比亞吉茲語編碼
AMHARIC=埃塞俄比亞阿姆哈拉語編碼
CESU_8=拉丁美洲使用的Unicode變種編碼
