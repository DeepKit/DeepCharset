[EncodingDescriptions]
# Unicodeエンコーディングの説明
UTF8=BOMなしのUnicodeエンコーディング、ウェブページやクロスプラットフォームテキストに適しています
UTF8BOM=BOM付きのUnicodeエンコーディング、Windowsでより互換性があります
UTF16LE=16ビットUnicodeエンコーディング、Windows標準フォーマット
UTF16BE=16ビットUnicodeエンコーディング、Mac/Unixで一般的なフォーマット
UTF32LE=32ビットUnicodeエンコーディング、すべてのUnicode文字をサポート
UTF32BE=32ビットUnicodeエンコーディング、ビッグエンディアンバージョン
UTF7=7ビットASCII互換のUnicodeエンコーディング、メールシステムで使用

# 基本エンコーディングの説明
ASCII=基本的な英語文字セット、英語の文字と数字のみをサポート
ANSI=現在のシステムデフォルトエンコーディング、WindowsではCP1252が一般的

# 中国語エンコーディングの説明
GBK=中国の国家標準、簡体字と一部の繁体字をサポート
GB18030=中国の必須標準、すべての中国語文字をサポート
GB2312=基本的な簡体字中国語エンコーディング、一般的な文字のみをサポート
BIG5=台湾と香港で使用される繁体字中国語エンコーディング
BIG5_HKSCS=香港補足文字セット、香港特有の文字をサポート
CP936=Windows簡体字中国語エンコーディング、基本的にGBKと同じ
CP950=Windows繁体字中国語エンコーディング、基本的にBig5と同じ
EUC_TW=台湾で使用される拡張Unixエンコーディング

# 日本語エンコーディングの説明
SHIFT_JIS=最も一般的な日本語エンコーディング、Windows日本語デフォルト
EUC_JP=Unixシステムでよく使用される日本語エンコーディング
CP932=Windows日本語エンコーディング、Shift-JISの拡張版
ISO_2022_JP=電子メールとウェブページで使用される日本語エンコーディング

# 韓国語エンコーディングの説明
EUC_KR=Unixシステムでよく使用される韓国語エンコーディング
CP949=Windows韓国語エンコーディング、EUC-KRの拡張版
ISO_2022_KR=メールシステムで使用される韓国語エンコーディング

# Windowsエンコーディングの説明
WINDOWS1250=Windows中央ヨーロッパエンコーディング、ポーランド語、チェコ語などをサポート
WINDOWS1251=Windowsキリル文字エンコーディング、ロシア語などをサポート
WINDOWS1252=Windows西ヨーロッパエンコーディング、英語、フランス語、ドイツ語などをサポート
WINDOWS1253=Windowsギリシャ語エンコーディング
