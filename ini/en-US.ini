[EncodingDescriptions]
# Unicode Encoding Descriptions
UTF8=Unicode encoding without BOM, suitable for web pages and cross-platform text
UTF8BOM=Unicode encoding with BOM, more compatible in Windows
UTF16LE=16-bit Unicode encoding, Windows default format
UTF16BE=16-bit Unicode encoding, Mac/Unix common format
UTF32LE=32-bit Unicode encoding, supports all Unicode characters
UTF32BE=32-bit Unicode encoding, big-endian byte order version
UTF7=7-bit ASCII compatible Unicode encoding used in mail systems

# Basic Encoding Descriptions
ASCII=Basic English character set, only supports English and numbers
ANSI=Current system default encoding, usually CP1252 in Windows

# Chinese Encoding Descriptions
GBK=Chinese national standard encoding, supports simplified and some traditional characters
GB18030=Chinese mandatory standard encoding, supports all Chinese characters
GB2312=Basic simplified Chinese encoding, only supports common characters
BIG5=Traditional Chinese encoding used in Taiwan and Hong Kong
BIG5_HKSCS=Hong Kong supplementary character set, supports Hong Kong special characters
CP936=Windows simplified Chinese encoding, basically the same as GBK
CP950=Windows traditional Chinese encoding, basically the same as Big5
EUC_TW=Extended Unix encoding used in Taiwan

# Japanese Encoding Descriptions
SHIFT_JIS=Most common Japanese encoding, Windows default Japanese encoding
EUC_JP=Japanese encoding commonly used in Unix systems
CP932=Windows Japanese encoding, extended version of Shift-JIS
ISO_2022_JP=Japanese encoding used in email and web pages

# Korean Encoding Descriptions
EUC_KR=Korean encoding commonly used in Unix systems
CP949=Windows Korean encoding, extended version of EUC-KR
ISO_2022_KR=Korean encoding used in mail systems

# Windows Encoding Descriptions
WINDOWS1250=Windows Central European encoding, supports Polish, Czech, etc.
WINDOWS1251=Windows Cyrillic encoding, supports Russian, etc.
WINDOWS1252=Windows Western European encoding, supports English, French, German, etc.
WINDOWS1253=Windows Greek encoding
WINDOWS1254=Windows Turkish encoding
WINDOWS1255=Windows Hebrew encoding, right-to-left display
WINDOWS1256=Windows Arabic encoding, right-to-left display
WINDOWS1257=Windows Baltic encoding
WINDOWS1258=Windows Vietnamese encoding

# ISO Encoding Descriptions
ISO8859_1=International standard Latin alphabet 1, Western European languages
ISO8859_2=International standard Latin alphabet 2, Central European languages
ISO8859_3=International standard Latin alphabet 3, South European languages
ISO8859_4=International standard Latin alphabet 4, North European languages
ISO8859_5=International standard Cyrillic alphabet, Slavic languages
ISO8859_6=International standard Arabic alphabet
ISO8859_7=International standard Greek alphabet
ISO8859_8=International standard Hebrew alphabet
ISO8859_9=International standard Latin alphabet 5, Turkish
ISO8859_10=International standard Latin alphabet 6, Nordic languages
ISO8859_11=International standard Thai alphabet
ISO8859_13=International standard Latin alphabet 7, Baltic languages
ISO8859_14=International standard Latin alphabet 8, Celtic languages
ISO8859_15=International standard Latin alphabet 9, updated Western European
ISO8859_16=International standard Latin alphabet 10, Southeast European languages
ISO_8859_6_I=International standard Arabic alphabet, supports right-to-left display

# DOS/OEM Encoding Descriptions
IBM437=DOS US English encoding, includes basic graphic characters
IBM850=DOS Western European encoding
IBM860=DOS Portuguese encoding
IBM865=DOS Nordic encoding
CP862=DOS Hebrew encoding
CP864=DOS Arabic encoding

# Other Regional Encoding Descriptions
KOI8R=Russian encoding, common in Internet and Unix systems
KOI8U=Ukrainian encoding, extension of KOI8-R
MACROMAN=Apple Mac system Western European encoding
MACCYRILLIC=Apple Mac system Cyrillic encoding
VISCII=Vietnamese encoding, supports all Vietnamese characters
TIS_620=Thai standard encoding, supports Thai
TSCII=Tamil encoding, South Indian language
ISCII=Indian language encoding, supports multiple Indian languages
ARMSCII_8=Armenian encoding
MONGOLIAN=Mongolian encoding, supports traditional Mongolian script
TIBETAN=Tibetan encoding, supports Tibetan characters
LAO=Lao encoding, supports Lao characters
KHMER=Cambodian Khmer encoding
MYANMAR=Myanmar encoding, supports Burmese characters
INDONESIAN=Indonesian encoding
MALAY=Malay encoding
GEEZ=Ethiopian Geez encoding
AMHARIC=Ethiopian Amharic encoding
CESU_8=Latin American Unicode variant encoding
