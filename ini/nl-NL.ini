[EncodingDescriptions]
# Unicode codering beschrijvingen
UTF8=Unicode codering zonder BOM, geschikt voor webpagina's en cross-platform tekst
UTF8BOM=Unicode codering met BOM, beter compatibel onder Windows
UTF16LE=16-bit Unicode codering, Windows standaard formaat
UTF16BE=16-bit Unicode codering, Mac/Unix gebruikelijk formaat
UTF32LE=32-bit Unicode codering, ondersteunt alle Unicode tekens
UTF32BE=32-bit Unicode codering, big-endian byte volgorde
UTF7=7-bit ASCII-compatibele Unicode codering voor mailsystemen

# Basis codering beschrijvingen
ASCII=Basis Engels tekenset, ondersteunt alleen Engelse tekens en cijfers
ANSI=Huidige systeem standaard codering, meestal CP1252 onder Windows

# Chinese codering beschrijvingen
GBK=Chinese nationale standaard, ondersteunt vereenvoudigde en sommige traditionele tekens
GB18030=Chinese verplichte standaard, ondersteunt alle Chinese tekens
GB2312=Basis vereenvoudigd Chinese codering, ondersteunt alleen gangbare tekens
BIG5=Traditionele Chinese codering gebruikt in Taiwan en Hong Kong
BIG5_HKSCS=Hong Kong aanvullende tekenset, ondersteunt speciale Hong Kong tekens
CP936=Windows vereenvoudigd Chinese codering, in wezen identiek aan GBK
CP950=Windows traditionele Chinese codering, in wezen identiek aan Big5
EUC_TW=Uitgebreide Unix codering gebruikt in Taiwan

# Japanse codering beschrijvingen
SHIFT_JIS=Meest voorkomende Japanse codering, Windows Japanse standaard
EUC_JP=Japanse codering vaak gebruikt in Unix systemen
CP932=Windows Japanse codering, uitgebreide versie van Shift-JIS
ISO_2022_JP=Japanse codering gebruikt in e-mail en webpagina's

# Koreaanse codering beschrijvingen
EUC_KR=Koreaanse codering vaak gebruikt in Unix systemen
CP949=Windows Koreaanse codering, uitgebreide versie van EUC-KR
ISO_2022_KR=Koreaanse codering gebruikt in mailsystemen

# Windows codering beschrijvingen
WINDOWS1250=Windows Centraal-Europese codering, ondersteunt Pools, Tsjechisch, etc.
WINDOWS1251=Windows Cyrillische codering, ondersteunt Russisch, etc.
WINDOWS1252=Windows West-Europese codering, ondersteunt Engels, Frans, Duits, etc.
