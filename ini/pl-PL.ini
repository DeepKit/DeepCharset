ISO8859_10=Międzynarodowy standardowy alfabet łaciński 6, języki nordyckie
ISO8859_11=Międzynarodowy standardowy alfabet tajski
ISO8859_13=Międzynarodowy standardowy alfabet łaciński 7, języki bałtyckie
ISO8859_14=Międzynarodowy standardowy alfabet łaciński 8, języki celtyckie
