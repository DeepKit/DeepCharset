[EncodingDescriptions]
# Opisy kodowań Unicode
UTF8=Kodowanie Unicode bez BOM, odpowiednie dla stron internetowych i tekstu wieloplatformowego
UTF8BOM=Kodowanie Unicode z BOM, lepiej kompatybilne w systemie Windows
UTF16LE=16-bitowe kodowanie Unicode, standardowy format Windows
UTF16BE=16-bitowe kodowanie Unicode, format powszechny w Mac/Unix
UTF32LE=32-bitowe kodowanie Unicode, obsługuje wszystkie znaki Unicode
UTF32BE=32-bitowe kodowanie Unicode, wersja big-endian
UTF7=7-bitowe kodowanie Unicode kompatybilne z ASCII, używane w systemach pocztowych

# Opisy kodowań podstawowych
ASCII=Podstawowy zestaw znaków angielskich, obsługuje tylko znaki angielskie i cyfry
ANSI=Aktualne domyślne kodowanie systemowe, zwykle CP1252 w systemie Windows

# Opisy kodowań chińskich
GBK=Chiński standard narodowy, obsługuje znaki uproszczone i niektóre tradycyjne
GB18030=Chiński standard obowiązkowy, obsługuje wszystkie znaki chińskie
GB2312=Podstawowe kodowanie chińskie uproszczone, obsługuje tylko znaki powszechne
BIG5=Tradycyjne kodowanie chińskie używane na Tajwanie i w Hongkongu
BIG5_HKSCS=Zestaw znaków uzupełniających Hongkongu, obsługuje specjalne znaki Hongkongu
CP936=Kodowanie chińskie uproszczone Windows, zasadniczo identyczne z GBK
CP950=Kodowanie chińskie tradycyjne Windows, zasadniczo identyczne z Big5
EUC_TW=Rozszerzone kodowanie Unix używane na Tajwanie

# Opisy kodowań japońskich
SHIFT_JIS=Najczęściej używane kodowanie japońskie, domyślne kodowanie japońskie Windows
EUC_JP=Kodowanie japońskie często używane w systemach Unix
CP932=Kodowanie japońskie Windows, rozszerzona wersja Shift-JIS
ISO_2022_JP=Kodowanie japońskie używane w e-mailach i stronach internetowych

# Opisy kodowań koreańskich
EUC_KR=Kodowanie koreańskie często używane w systemach Unix
CP949=Kodowanie koreańskie Windows, rozszerzona wersja EUC-KR
ISO_2022_KR=Kodowanie koreańskie używane w systemach pocztowych

# Opisy kodowań Windows
WINDOWS1250=Kodowanie Windows dla Europy Środkowej, obsługuje polski, czeski itp.
WINDOWS1251=Kodowanie Windows cyrylicy, obsługuje rosyjski itp.
WINDOWS1252=Kodowanie Windows dla Europy Zachodniej, obsługuje angielski, francuski, niemiecki itp.
WINDOWS1253=Kodowanie Windows greckie
WINDOWS1254=Kodowanie Windows tureckie
WINDOWS1255=Kodowanie Windows hebrajskie, wyświetlanie od prawej do lewej
WINDOWS1256=Kodowanie Windows arabskie, wyświetlanie od prawej do lewej
WINDOWS1257=Kodowanie Windows bałtyckie
WINDOWS1258=Kodowanie Windows wietnamskie

# Opisy kodowań ISO
ISO8859_1=Międzynarodowy standardowy alfabet łaciński 1, języki Europy Zachodniej
ISO8859_2=Międzynarodowy standardowy alfabet łaciński 2, języki Europy Środkowej
ISO8859_3=Międzynarodowy standardowy alfabet łaciński 3, języki Europy Południowej
ISO8859_4=Międzynarodowy standardowy alfabet łaciński 4, języki Europy Północnej
ISO8859_5=Międzynarodowy standardowy alfabet cyrylicy, języki słowiańskie
ISO8859_6=Międzynarodowy standardowy alfabet arabski
ISO8859_7=Międzynarodowy standardowy alfabet grecki
ISO8859_8=Międzynarodowy standardowy alfabet hebrajski
