[EncodingDescriptions]
# Mô tả mã hóa Unicode
UTF8=Mã hóa Unicode không có dấu BOM, phù hợp cho trang web và văn bản đa nền tảng
UTF8BOM=Mã hóa Unicode có dấu BOM, tương thích tốt hơn trên Windows
UTF16LE=Mã hóa Unicode 16-bit, định dạng chuẩn của Windows
UTF16BE=Mã hóa Unicode 16-bit, định dạng phổ biến trên Mac/Unix
UTF32LE=Mã hóa Unicode 32-bit, hỗ trợ tất cả các ký tự Unicode
UTF32BE=Mã hóa Unicode 32-bit, phiên bản byte lớn đầu tiên
UTF7=Mã hóa Unicode tương thích ASCII 7-bit được sử dụng trong hệ thống email

# Mô tả mã hóa cơ bản
ASCII=Bộ ký tự tiếng Anh cơ bản, chỉ hỗ trợ tiếng Anh và số
ANSI=Mã hóa mặc định của hệ thống hiện tại, thường là CP1252 trên Windows

# Mô tả mã hóa tiếng Trung
GBK=Mã hóa tiêu chuẩn quốc gia Trung Quốc, hỗ trợ tiếng Trung giản thể và một phần phồn thể
GB18030=Mã hóa tiêu chuẩn bắt buộc của Trung Quốc, hỗ trợ tất cả các ký tự tiếng Trung
GB2312=Mã hóa cơ bản tiếng Trung giản thể, chỉ hỗ trợ các ký tự thông dụng
BIG5=Mã hóa tiếng Trung phồn thể được sử dụng ở Đài Loan và Hồng Kông
BIG5_HKSCS=Bộ ký tự bổ sung Hồng Kông, hỗ trợ các ký tự đặc biệt của Hồng Kông
CP936=Mã hóa tiếng Trung giản thể của Windows, về cơ bản giống với GBK
CP950=Mã hóa tiếng Trung phồn thể của Windows, về cơ bản giống với Big5
EUC_TW=Mã hóa Unix mở rộng được sử dụng ở Đài Loan

# Mô tả mã hóa tiếng Nhật
SHIFT_JIS=Mã hóa tiếng Nhật phổ biến nhất, mã hóa tiếng Nhật chuẩn của Windows
EUC_JP=Mã hóa tiếng Nhật phổ biến trong hệ thống Unix
CP932=Mã hóa tiếng Nhật của Windows, phiên bản mở rộng của Shift-JIS
ISO_2022_JP=Mã hóa được sử dụng trong email và trang web tiếng Nhật

# Mô tả mã hóa tiếng Hàn
EUC_KR=Mã hóa tiếng Hàn phổ biến trong hệ thống Unix
CP949=Mã hóa tiếng Hàn của Windows, phiên bản mở rộng của EUC-KR
ISO_2022_KR=Mã hóa được sử dụng trong hệ thống email tiếng Hàn

# Mô tả mã hóa Windows
WINDOWS1250=Mã hóa ngôn ngữ Trung Âu của Windows, hỗ trợ tiếng Ba Lan, Séc, v.v.
WINDOWS1251=Mã hóa Cyrillic của Windows, hỗ trợ tiếng Nga, v.v.
WINDOWS1252=Mã hóa ngôn ngữ Tây Âu của Windows, hỗ trợ tiếng Anh, Pháp, Đức, v.v.
WINDOWS1253=Mã hóa tiếng Hy Lạp của Windows
WINDOWS1254=Mã hóa tiếng Thổ Nhĩ Kỳ của Windows
WINDOWS1255=Mã hóa tiếng Do Thái của Windows, hiển thị từ phải sang trái
WINDOWS1256=Mã hóa tiếng Ả Rập của Windows, hiển thị từ phải sang trái
WINDOWS1257=Mã hóa ngôn ngữ Baltic của Windows
WINDOWS1258=Mã hóa tiếng Việt của Windows

# Mô tả mã hóa ISO
ISO8859_1=Bảng chữ cái Latin 1 tiêu chuẩn quốc tế, ngôn ngữ Tây Âu
ISO8859_2=Bảng chữ cái Latin 2 tiêu chuẩn quốc tế, ngôn ngữ Trung Âu
ISO8859_3=Bảng chữ cái Latin 3 tiêu chuẩn quốc tế, ngôn ngữ Nam Âu
ISO8859_4=Bảng chữ cái Latin 4 tiêu chuẩn quốc tế, ngôn ngữ Bắc Âu
ISO8859_5=Bảng chữ cái Cyrillic tiêu chuẩn quốc tế, ngôn ngữ Slav
ISO8859_6=Bảng chữ cái Ả Rập tiêu chuẩn quốc tế
ISO8859_7=Bảng chữ cái Hy Lạp tiêu chuẩn quốc tế
ISO8859_8=Bảng chữ cái Do Thái tiêu chuẩn quốc tế
ISO8859_9=Bảng chữ cái Latin 5 tiêu chuẩn quốc tế, tiếng Thổ Nhĩ Kỳ
ISO8859_10=Bảng chữ cái Latin 6 tiêu chuẩn quốc tế, ngôn ngữ Bắc Âu
ISO8859_11=Bảng chữ cái Thái tiêu chuẩn quốc tế
ISO8859_13=Bảng chữ cái Latin 7 tiêu chuẩn quốc tế, ngôn ngữ Baltic
ISO8859_14=Bảng chữ cái Latin 8 tiêu chuẩn quốc tế, ngôn ngữ Celtic
ISO8859_15=Bảng chữ cái Latin 9 tiêu chuẩn quốc tế, phiên bản cập nhật của ngôn ngữ Tây Âu
ISO8859_16=Bảng chữ cái Latin 10 tiêu chuẩn quốc tế, ngôn ngữ Đông Nam Âu
ISO_8859_6_I=Bảng chữ cái Ả Rập tiêu chuẩn quốc tế, hỗ trợ hiển thị từ phải sang trái

# Mô tả mã hóa DOS/OEM
IBM437=Mã hóa tiếng Anh Mỹ DOS, bao gồm các ký tự đồ họa cơ bản
IBM850=Mã hóa ngôn ngữ Tây Âu DOS
IBM860=Mã hóa tiếng Bồ Đào Nha DOS
IBM865=Mã hóa ngôn ngữ Bắc Âu DOS
CP862=Mã hóa tiếng Do Thái DOS
CP864=Mã hóa tiếng Ả Rập DOS

# Mô tả mã hóa khu vực
KOI8R=Mã hóa tiếng Nga, phổ biến trên internet và hệ thống Unix
KOI8U=Mã hóa tiếng Ukraine, phần mở rộng của KOI8-R
MACROMAN=Mã hóa ngôn ngữ Tây Âu của hệ thống Apple Mac
MACCYRILLIC=Mã hóa Cyrillic của hệ thống Apple Mac
VISCII=Mã hóa tiếng Việt, hỗ trợ tất cả các ký tự tiếng Việt
TIS_620=Mã hóa tiêu chuẩn Thái Lan, hỗ trợ tiếng Thái
TSCII=Mã hóa tiếng Tamil, ngôn ngữ miền Nam Ấn Độ
ISCII=Mã hóa ngôn ngữ Ấn Độ, hỗ trợ nhiều ngôn ngữ Ấn Độ
ARMSCII_8=Mã hóa tiếng Armenia
MONGOLIAN=Mã hóa tiếng Mông Cổ, hỗ trợ chữ viết Mông Cổ truyền thống
TIBETAN=Mã hóa tiếng Tây Tạng, hỗ trợ ký tự Tây Tạng
LAO=Mã hóa tiếng Lào, hỗ trợ ký tự Lào
KHMER=Mã hóa tiếng Khmer Campuchia
MYANMAR=Mã hóa tiếng Myanmar, hỗ trợ ký tự Myanmar
INDONESIAN=Mã hóa tiếng Indonesia
MALAY=Mã hóa tiếng Mã Lai
GEEZ=Mã hóa tiếng Geez Ethiopia
AMHARIC=Mã hóa tiếng Amharic Ethiopia
CESU_8=Biến thể Unicode được sử dụng ở Mỹ Latinh
