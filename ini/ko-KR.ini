[EncodingDescriptions]
# 유니코드 인코딩 설명
UTF8=BOM이 없는 유니코드 인코딩, 웹 페이지 및 크로스 플랫폼 텍스트에 적합
UTF8BOM=BOM이 있는 유니코드 인코딩, Windows에서 더 호환성이 좋음
UTF16LE=16비트 유니코드 인코딩, Windows 표준 형식
UTF16BE=16비트 유니코드 인코딩, Mac/Unix에서 일반적인 형식
UTF32LE=32비트 유니코드 인코딩, 모든 유니코드 문자 지원
UTF32BE=32비트 유니코드 인코딩, 빅 엔디안 버전
UTF7=7비트 ASCII 호환 유니코드 인코딩, 메일 시스템에서 사용

# 기본 인코딩 설명
ASCII=기본 영어 문자 집합, 영어 문자와 숫자만 지원
ANSI=현재 시스템 기본 인코딩, Windows에서는 보통 CP1252

# 중국어 인코딩 설명
GBK=중국 국가 표준, 간체자와 일부 번체자 지원
GB18030=중국 필수 표준, 모든 중국어 문자 지원
GB2312=기본 간체 중국어 인코딩, 일반적인 문자만 지원
BIG5=대만과 홍콩에서 사용되는 번체 중국어 인코딩
BIG5_HKSCS=홍콩 보충 문자 집합, 홍콩 특유의 문자 지원
CP936=Windows 간체 중국어 인코딩, 기본적으로 GBK와 동일
CP950=Windows 번체 중국어 인코딩, 기본적으로 Big5와 동일
EUC_TW=대만에서 사용되는 확장 유닉스 인코딩

# 일본어 인코딩 설명
SHIFT_JIS=가장 일반적인 일본어 인코딩, Windows 일본어 기본값
EUC_JP=유닉스 시스템에서 자주 사용되는 일본어 인코딩
CP932=Windows 일본어 인코딩, Shift-JIS의 확장 버전
ISO_2022_JP=이메일 및 웹 페이지에서 사용되는 일본어 인코딩

# 한국어 인코딩 설명
EUC_KR=유닉스 시스템에서 자주 사용되는 한국어 인코딩
CP949=Windows 한국어 인코딩, EUC-KR의 확장 버전
ISO_2022_KR=메일 시스템에서 사용되는 한국어 인코딩

# Windows 인코딩 설명
WINDOWS1250=Windows 중앙 유럽 인코딩, 폴란드어, 체코어 등 지원
WINDOWS1251=Windows 키릴 문자 인코딩, 러시아어 등 지원
WINDOWS1252=Windows 서유럽 인코딩, 영어, 프랑스어, 독일어 등 지원
WINDOWS1253=Windows 그리스어 인코딩
WINDOWS1254=Windows 터키어 인코딩
WINDOWS1255=Windows 히브리어 인코딩, 오른쪽에서 왼쪽으로 표시
WINDOWS1256=Windows 아랍어 인코딩, 오른쪽에서 왼쪽으로 표시
WINDOWS1257=Windows 발트어 인코딩
WINDOWS1258=Windows 베트남어 인코딩

# ISO 인코딩 설명
ISO8859_1=국제 표준 라틴 알파벳 1, 서유럽 언어
ISO8859_2=국제 표준 라틴 알파벳 2, 중앙 유럽 언어
ISO8859_3=국제 표준 라틴 알파벳 3, 남유럽 언어
ISO8859_4=국제 표준 라틴 알파벳 4, 북유럽 언어
ISO8859_5=국제 표준 키릴 알파벳, 슬라브 언어
ISO8859_6=국제 표준 아랍 알파벳
ISO8859_7=국제 표준 그리스 알파벳
ISO8859_8=국제 표준 히브리 알파벳
ISO8859_9=국제 표준 라틴 알파벳 5, 터키어
ISO8859_10=국제 표준 라틴 알파벳 6, 북유럽 언어
ISO8859_11=국제 표준 태국 알파벳
ISO8859_13=국제 표준 라틴 알파벳 7, 발트 언어
ISO8859_14=국제 표준 라틴 알파벳 8, 켈트 언어
ISO8859_15=국제 표준 라틴 알파벳 9, 업데이트된 서유럽
ISO8859_16=국제 표준 라틴 알파벳 10, 동남 유럽 언어
ISO_8859_6_I=국제 표준 아랍 알파벳, 오른쪽에서 왼쪽으로 표시 지원

# DOS/OEM 인코딩 설명
IBM437=DOS 미국 영어 인코딩, 기본 그래픽 문자 포함
IBM850=DOS 서유럽 인코딩
IBM860=DOS 포르투갈어 인코딩
IBM865=DOS 북유럽 인코딩
CP862=DOS 히브리어 인코딩
CP864=DOS 아랍어 인코딩

# 기타 지역 인코딩 설명
KOI8R=러시아어 인코딩, 인터넷 및 유닉스 시스템에서 일반적
KOI8U=우크라이나어 인코딩, KOI8-R의 확장
MACROMAN=Apple Mac 시스템 서유럽 인코딩
MACCYRILLIC=Apple Mac 시스템 키릴 문자 인코딩
VISCII=베트남어 인코딩, 모든 베트남어 문자 지원
TIS_620=태국 표준, 태국어 지원
TSCII=타밀어 인코딩, 남인도 언어
ISCII=인도 언어 인코딩, 여러 인도 언어 지원
ARMSCII_8=아르메니아어 인코딩
MONGOLIAN=몽골어 인코딩, 전통 몽골 문자 지원
TIBETAN=티베트어 인코딩, 티베트 문자 지원
LAO=라오어 인코딩, 라오스 문자 지원
KHMER=캄보디아 크메르어 인코딩
MYANMAR=미얀마어 인코딩, 버마 문자 지원
INDONESIAN=인도네시아어 인코딩
MALAY=말레이어 인코딩
GEEZ=에티오피아 게에즈어 인코딩
AMHARIC=에티오피아 암하라어 인코딩
CESU_8=라틴 아메리카 유니코드 변형 인코딩
